<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Tasks">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Tasks</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">
    <link rel="stylesheet" href="styles.css?v=0.2.11">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="topbar-actions">
          <div class="settings-menu-shell">
            <button class="settings-menu-button" id="settingsMenuButton" type="button" aria-haspopup="menu" aria-controls="settingsMenu" aria-expanded="false">
              Menu
            </button>
            <div class="settings-menu" id="settingsMenu" role="menu" aria-label="App menu" hidden>
              <button class="menu-link settings-menu-item sync-error-button is-danger" id="syncErrorButton" type="button" role="menuitem" hidden>Details</button>
              <button class="menu-link settings-menu-item" id="refreshSyncButton" type="button" role="menuitem">Refresh Sync</button>
              <button class="menu-link settings-menu-item" id="updateAppButton" type="button" role="menuitem">Update App</button>
              <button class="menu-link settings-menu-item" id="viewArchiveButton" type="button" role="menuitem">View Archive</button>
              <button class="menu-link settings-menu-item" id="copyArchiveButton" type="button" role="menuitem">Copy Archive</button>
              <button class="menu-link settings-menu-item" id="downloadArchiveButton" type="button" role="menuitem">Download Archive</button>
              <button class="menu-link settings-menu-item" id="themeToggle" type="button" role="menuitem">Dark Mode</button>
              <button class="menu-link settings-menu-item settings-options-toggle" id="optionsToggleButton" type="button" role="menuitem" aria-expanded="false" aria-controls="settingsOptions">Options</button>
              <div class="settings-options" id="settingsOptions" hidden>
                <div class="settings-option-group">
                  <p class="settings-option-label">Footer</p>
                  <label class="settings-toggle-row">
                    <span>Tomorrow</span>
                    <input id="showTomorrowOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                  <label class="settings-toggle-row">
                    <span>Scheduled</span>
                    <input id="showScheduledOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                  <label class="settings-toggle-row">
                    <span>On hold</span>
                    <input id="showOnHoldOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                  <label class="settings-toggle-row">
                    <span>Projects</span>
                    <input id="showProjectsOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                </div>
                <div class="settings-option-group">
                  <p class="settings-option-label">Display</p>
                  <label class="settings-toggle-row">
                    <span>Compact mode</span>
                    <input id="compactModeOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                </div>
                <div class="settings-option-group">
                  <p class="settings-option-label">Schedule</p>
                  <label class="settings-toggle-row">
                    <span>Weekend mode</span>
                    <input id="weekendModeOption" type="checkbox">
                    <span class="settings-switch" aria-hidden="true"></span>
                  </label>
                </div>
              </div>
              <div class="settings-detail" role="presentation">
                <span>Last synced</span>
                <span id="lastSyncedAt">Never</span>
              </div>
              <div class="settings-detail settings-version" role="presentation">
                <span>Version</span>
                <span id="appVersion"></span>
              </div>
              <button class="menu-link settings-menu-item sync-button" id="syncButton" type="button" role="menuitem">Sync</button>
            </div>
          </div>
          <div class="sync-control" aria-live="polite">
            <span class="sync-status" id="syncStatus">Local</span>
          </div>
        </div>
        <p class="header-date" id="todayLabel"></p>
      </header>

      <section class="today-section" aria-label="Today list">
        <ul id="todayBoard" class="list-board today-board"></ul>
      </section>

      <section class="controls filter-control" aria-label="Task controls">
        <div class="filter-menu-shell">
          <button class="filter-menu-button" id="filterMenuButton" type="button" aria-haspopup="menu" aria-controls="filterMenu" aria-expanded="false">
            <span class="filter-menu-prefix">View</span>
            <span id="filterMenuLabel">All</span>
          </button>
          <div class="filter-menu" id="filterMenu" role="menu" aria-label="Filter tasks" hidden>
            <button class="menu-link filter-menu-item is-active" type="button" data-filter="all" role="menuitemradio" aria-checked="true">All</button>
            <button class="menu-link filter-menu-item" type="button" data-filter="active" role="menuitemradio" aria-checked="false">Open</button>
            <button class="menu-link filter-menu-item" type="button" data-filter="completed" role="menuitemradio" aria-checked="false">Completed</button>
            <button class="menu-link filter-menu-item" type="button" data-filter="shared" role="menuitemradio" aria-checked="false">Shared</button>
            <button class="menu-link filter-menu-item" type="button" data-filter="private" role="menuitemradio" aria-checked="false">Private</button>
            <button class="menu-link filter-menu-item filter-menu-command" type="button" data-filter-command="hide-all-lists" role="menuitem">Hide All</button>
          </div>
        </div>
      </section>

      <section class="list-section" aria-label="Standing lists">
        <ul id="listBoard" class="list-board"></ul>
        <div id="emptyState" class="empty-state" hidden>
          <h2>No lists here</h2>
          <p>Add a list or choose another view.</p>
        </div>
      </section>

      <section class="composer" aria-label="Create a standing list">
        <form id="listForm" class="list-form" autocomplete="off">
          <label class="field">
            <input id="listName" name="name" type="text" placeholder="New list" aria-label="New list name" required maxlength="80">
          </label>
          <button class="primary-button" type="submit">Add List</button>
        </form>
      </section>

      <section class="footer-tray" id="footerTray" aria-label="Pinned footer lists">
        <div class="footer-tabs" role="tablist" aria-label="Footer lists">
          <button class="footer-tab" id="tomorrowToggle" type="button" role="tab" data-footer-tab="tomorrow" aria-controls="footerTomorrowPanel" aria-expanded="true">
            <span id="tomorrowLabel">Tomorrow</span>
            <span class="footer-tab-count" id="tomorrowCount">0</span>
          </button>
          <button class="footer-tab" id="footerScheduledTab" type="button" role="tab" data-footer-tab="scheduled" aria-controls="footerScheduledPanel">
            <span>Scheduled</span>
            <span class="footer-tab-count" id="scheduledCount">0</span>
          </button>
          <button class="footer-tab" id="footerOnHoldTab" type="button" role="tab" data-footer-tab="on-hold" aria-controls="footerOnHoldPanel">
            <span>On hold</span>
            <span class="footer-tab-count" id="onHoldCount">0</span>
          </button>
          <button class="footer-tab" id="footerProjectsTab" type="button" role="tab" data-footer-tab="projects" aria-controls="footerProjectsPanel">
            <span>Projects</span>
            <span class="footer-tab-count" id="projectCount">0</span>
          </button>
        </div>

        <section class="tomorrow-section footer-panel" id="footerTomorrowPanel" data-footer-panel="tomorrow" role="tabpanel" aria-labelledby="tomorrowToggle">
          <div class="tomorrow-body" id="tomorrowBody">
            <ul class="tomorrow-list" id="tomorrowList"></ul>
            <form class="tomorrow-form" id="tomorrowForm" autocomplete="off">
              <input id="tomorrowInput" name="title" type="text" placeholder="Add to tomorrow" aria-label="Add to tomorrow" required maxlength="120">
              <button class="primary-button" type="submit">Add</button>
            </form>
          </div>
        </section>

        <section class="scheduled-section footer-panel" id="footerScheduledPanel" data-footer-panel="scheduled" role="tabpanel" aria-labelledby="footerScheduledTab">
          <ul class="scheduled-list" id="scheduledList"></ul>
          <form class="scheduled-form" id="scheduledForm" autocomplete="off">
            <input id="scheduledInput" name="title" type="text" placeholder="Add scheduled" aria-label="Add scheduled task" required maxlength="120">
            <input id="scheduledDateInput" name="targetDate" type="hidden" required>
            <button class="scheduled-date-button" id="scheduledDateButton" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="scheduledDatePicker">Tomorrow</button>
            <button class="primary-button" type="submit">Add</button>
            <div class="scheduled-date-picker" id="scheduledDatePicker" role="dialog" aria-label="Choose scheduled date" hidden>
              <div class="scheduled-date-picker-header">
                <button class="scheduled-date-nav" type="button" data-scheduled-date-nav="previous" aria-label="Previous month">‹</button>
                <span class="scheduled-date-month" id="scheduledDatePickerLabel"></span>
                <button class="scheduled-date-nav" type="button" data-scheduled-date-nav="next" aria-label="Next month">›</button>
              </div>
              <div class="scheduled-date-weekdays" aria-hidden="true">
                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
              </div>
              <div class="scheduled-date-grid" id="scheduledDateGrid"></div>
            </div>
          </form>
        </section>

        <section class="on-hold-section footer-panel" id="footerOnHoldPanel" data-footer-panel="on-hold" role="tabpanel" aria-labelledby="footerOnHoldTab">
          <ul class="on-hold-list" id="onHoldList"></ul>
          <form class="on-hold-form" id="onHoldForm" autocomplete="off">
            <input id="onHoldInput" name="title" type="text" placeholder="Add on hold" aria-label="Add on hold task" required maxlength="120">
            <button class="primary-button" type="submit">Add</button>
          </form>
        </section>

        <section class="project-section footer-panel" id="footerProjectsPanel" data-footer-panel="projects" role="tabpanel" aria-labelledby="footerProjectsTab">
          <ul id="projectBoard" class="list-board project-board"></ul>
        </section>
      </section>
    </main>

    <div class="sync-auth-overlay" id="syncAuthDialog" hidden>
      <section class="sync-auth-card" role="dialog" aria-modal="true" aria-labelledby="syncAuthTitle">
        <div class="sync-auth-header">
          <h2 id="syncAuthTitle">Sign in to sync</h2>
          <button class="sync-auth-close" id="syncAuthClose" type="button">Close</button>
        </div>
        <p class="sync-auth-copy" id="syncAuthCopy">Enter your email and we will send an 8-digit code.</p>
        <form class="sync-auth-form" id="syncEmailForm" autocomplete="on">
          <label class="field">
            <span>Email</span>
            <input id="syncEmailInput" name="email" type="email" inputmode="email" autocomplete="email" required>
          </label>
          <button class="primary-button" type="submit">Send Code</button>
        </form>
        <form class="sync-auth-form" id="syncCodeForm" autocomplete="one-time-code" hidden>
          <label class="field">
            <span>Code</span>
            <input id="syncCodeInput" name="token" type="text" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]*" maxlength="8" required>
          </label>
          <div class="sync-auth-actions">
            <button class="secondary-button" id="syncCodeBack" type="button">Back</button>
            <button class="primary-button" type="submit">Verify</button>
          </div>
        </form>
        <p class="sync-auth-message" id="syncAuthMessage" aria-live="polite"></p>
      </section>
    </div>

    <div class="archive-overlay" id="archiveDialog" hidden>
      <section class="archive-card" role="dialog" aria-modal="true" aria-labelledby="archiveTitle">
        <div class="archive-header">
          <h2 id="archiveTitle">Archive</h2>
          <button class="archive-close" id="archiveClose" type="button">Close</button>
        </div>
        <div class="archive-content" id="archiveContent"></div>
        <div class="archive-actions">
          <button class="secondary-button" id="archiveCopy" type="button">Copy</button>
          <button class="primary-button" id="archiveDownload" type="button">Download</button>
        </div>
      </section>
    </div>

    <div class="undo-toast" id="undoToast" role="status" aria-live="polite" hidden>
      <span id="undoMessage"></span>
      <button id="undoButton" type="button">Undo</button>
      <button id="undoDismiss" type="button" aria-label="Dismiss">Dismiss</button>
    </div>

    <script src="sync-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=0.2.11"></script>
  </body>
</html>
